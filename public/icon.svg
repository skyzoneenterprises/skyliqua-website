<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Metallic Chrome / Silver Gradient for Cloud -->
    <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="25%" stop-color="#E5E7EB" />
      <stop offset="50%" stop-color="#9CA3AF" />
      <stop offset="75%" stop-color="#D1D5DB" />
      <stop offset="100%" stop-color="#4B5563" />
    </linearGradient>
    
    <!-- Deep Forest Teal to Ocean Teal Gradient for Waves -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22615F" />
      <stop offset="50%" stop-color="#14878E" />
      <stop offset="100%" stop-color="#0F5A56" />
    </linearGradient>

    <!-- Luxury Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#AC885B" />
      <stop offset="50%" stop-color="#B68F54" />
      <stop offset="100%" stop-color="#E1C06D" />
    </linearGradient>

    <!-- Glassmorphic Gloss Overlay -->
    <linearGradient id="glossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0" />
    </linearGradient>
    
    <!-- Shadow Filter for depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0C0F0D" flood-opacity="0.12" />
    </filter>
  </defs>

  <g filter="url(#dropShadow)">
    <!-- Stylized Cloud (Chrome/Silver finish) -->
    <path d="M180,290 
             C150,290 120,260 120,220 
             C120,180 155,150 195,155 
             C210,120 250,90 300,90 
             C360,90 400,135 395,185 
             C425,190 450,215 450,245 
             C450,275 425,300 395,300 
             L180,300 Z" 
          fill="url(#chromeGrad)" />

    <!-- Gloss Highlight on Cloud -->
    <path d="M180,290 
             C150,290 120,260 120,220 
             C120,210 123,200 128,190
             C142,230 180,250 220,250
             C270,250 310,210 330,170
             C350,130 390,110 395,185 
             C425,190 450,215 450,245 
             C450,250 448,255 445,260
             C435,225 410,205 380,205
             L180,290 Z" 
          fill="url(#glossGrad)" />

    <!-- Three Elegant Flowing Waves at the Bottom -->
    <!-- Wave 1: Teal (Main bold wave) -->
    <path d="M60,340 
             Q140,290 220,340 
             T380,340 
             Q430,365 470,340 
             L470,365 
             Q430,390 380,365 
             T220,365 
             Q140,315 60,365 Z" 
          fill="url(#tealGrad)" />

    <!-- Wave 2: Gold (Slightly offset, luxury metallic highlight) -->
    <path d="M80,380 
             Q160,335 240,380 
             T400,380 
             Q440,400 480,380 
             L480,395 
             Q440,415 400,395 
             T240,395 
             Q160,350 80,395 Z" 
          fill="url(#goldGrad)" />

    <!-- Wave 3: Secondary Deep Teal Wave (Thinner foundation wave) -->
    <path d="M110,420 
             Q180,385 250,420 
             T390,420 
             Q425,435 460,420 
             L460,430 
             Q425,445 390,430 
             T250,430 
             Q180,395 110,430 Z" 
          fill="url(#tealGrad)" opacity="0.8" />
  </g>
</svg>
